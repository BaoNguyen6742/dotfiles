# Misc
# https://wiki.hypr.land/Configuring/Variables/#misc
$terminal = wezterm
$fileManager = thunar
$menu = rofi -show drun

misc {
  font_family = "UDEVGothic35NFLG"
# close the workspaces if the last window is remove
    close_special_on_empty = true
}


# Ecosystem
# https://wiki.hypr.land/Configuring/Variables/#ecosystem
ecosystem {
  no_donation_nag = true
}

debug {
  disable_logs = false
}
