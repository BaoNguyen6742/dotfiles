general {
    hide_cursor = false
}

# --- BACKGROUND ---
background {
    monitor =
    path = $HOME/Documents/Pic/bg_2B_sddm.png
    color = rgba(15, 17, 26, 1.0)

    # GLASSMORPHISM EFFECT
    # 1. Enable Blur (2 or 3 passes is a good balance)
    blur_passes = 2
    blur_size = 5
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- 1. THE BIG CARD (Transparent Glass) ---
shape {
    monitor =
    size = 500, 600

    # 2. Make it Transparent
    # 0.4 means 40% visible (Glassy look)
    color = rgba(26, 28, 37, 0.2)

    rounding = 30
    border_size = 2
    border_color = rgba(137, 221, 255, 0.5) # Semi-transparent border

    position = -400, 0
    halign = center
    valign = center
}

# --- 2. AVATAR ---
image {
    monitor =
    path = $HOME/Documents/Pic/face-lock.png
    size = 200
    rounding = -1
    border_size = 4
    border_color = rgb(137, 221, 255)

    position = -400, 100
    halign = center
    valign = center
}

# --- 3. USERNAME ---
label {
    monitor =
    text = $USER
    color = rgba(255, 255, 255, 1.0)
    font_size = 28
    font_family = JetBrainsMono Nerd Font Bold

    position = -400, -20
    halign = center
    valign = center
}

# --- 4. INPUT FIELD ---
input-field {
    monitor =
    size = 350, 70
    outline_thickness = 3
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = false

    # Make the input box slightly transparent too to match the glass theme
    outer_color = rgba(137, 221, 255, 0.8)
    inner_color = rgba(15, 17, 26, 0.6)
    font_color = rgb(255, 255, 255)
    check_color = rgb(130, 170, 255)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false

    position = -400, -120
    halign = center
    valign = center
}

# --- 5. BIG CLOCK (Right Side) ---
label {
    monitor =
    text = $TIME
    # Added shadow for better visibility on blurred background
    shadow_passes = 1
    shadow_boost = 0.5

    color = rgb(255, 255, 255)
    font_size = 90
    font_family = JetBrainsMono Nerd Font ExtraBold

    position = 300, 0
    halign = center
    valign = center
}

# --- 6. DATE (Right Side) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgb(137, 221, 255)
    font_size = 24
    font_family = JetBrainsMono Nerd Font Bold

    position = 300, -80
    halign = center
    valign = center
}
