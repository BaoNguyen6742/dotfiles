general {
    lock_cmd = pidof hyprlock || hyprlock       # dbus/sysd lock command (called by loginctl)
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # turn on display after sleep
}

# 1. LOCK SCREEN (After 10 Minutes)
listener {
    timeout = 300
    on-timeout = loginctl lock-session
}

# 2. TURN OFF MONITOR (After 15 Minutes)
# On a PC, this is the best way to save power and monitor lifespan.
listener {
    timeout = 180
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# 3. SUSPEND (Optional - Commented out for PC)
# Most PC users prefer the PC to stay awake for downloads/servers.
